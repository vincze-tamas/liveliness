services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    expose:
      - "8000"
    volumes:
      - liveliness_data:/data
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////data/liveliness.db"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      GARMIN_USERNAME: "${GARMIN_USERNAME:-}"
      GARMIN_PASSWORD: "${GARMIN_PASSWORD:-}"
      SECRET_KEY: "${SECRET_KEY}"
      CORS_ORIGINS: '["https://${DOMAIN}"]'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ""
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  liveliness_data:
