services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - liveliness_data:/data
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////data/liveliness.db"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      GARMIN_USERNAME: "${GARMIN_USERNAME:-}"
      GARMIN_PASSWORD: "${GARMIN_PASSWORD:-}"
      SECRET_KEY: "${SECRET_KEY}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  liveliness_data:
